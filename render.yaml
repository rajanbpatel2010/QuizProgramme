databases:
  - name: assessment-db
    databaseName: assessment
    user: admin
    plan: free

services:
  - type: web
    name: assessment-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FRONTEND_URL
        fromService:
          name: assessment-frontend
          type: web
          property: host
      - key: DATABASE_URL
        fromDatabase:
          name: assessment-db
          property: connectionString
      - key: GEMINI_API_KEYS
        sync: false # Requires manual entry in Render dashboard, comma-separate multiple keys
      - key: SECRET_KEY
        generateValue: true

  - type: web
    name: assessment-frontend
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    rootDir: frontend
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: assessment-backend
          type: web
          property: host
